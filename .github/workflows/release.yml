name: Create Release

# Triggered when a version tag is pushed (e.g. git tag v9.0.0-beta && git push origin v9.0.0-beta)
# Build and upload release artifacts from your local machine using build.ps1.
on:
  push:
    tags:
      - 'v*.*.*'

permissions:
  contents: write

jobs:
  release:
    name: Create GitHub Release
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Extract release notes from CHANGELOG
        run: |
          VERSION="${GITHUB_REF_NAME#v}"
          VERSION_ESC=$(echo "$VERSION" | sed 's/\./\\./g')
          awk "/^## \[?${VERSION_ESC}\]?/{found=1; next} found && /^## /{exit} found{print}" CHANGELOG.md > release_notes.md
          [ -s release_notes.md ] || echo "See [CHANGELOG.md](CHANGELOG.md) for details." > release_notes.md

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          name: Gamelist Manager ${{ github.ref_name }}
          body_path: release_notes.md
          draft: true
          prerelease: ${{ contains(github.ref_name, 'beta') || contains(github.ref_name, 'alpha') || contains(github.ref_name, 'rc') }}
